<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo | Giacomini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --verde-principal: #166e36; --verde-escuro: #0e4722; --verde-destaque: #1ebe5d; --grafite: #333333; --fundo: #f4f7f6; --branco: #FFFFFF; --texto: #444; --borda: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--fundo); color: var(--texto); overflow-x: hidden; }

        header { background: var(--verde-principal); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;}
        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; margin: 0 auto;}
        .logo-img { height: 45px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.7); background: white; padding: 2px; }
        .logo-texto { color: var(--branco); font-size: 1.5em; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        
        .icone-carrinho-topo { color: var(--branco); text-decoration: none; font-size: 1.4em; position: absolute; right: 5%; transition: 0.3s;}
        .icone-carrinho-topo:hover { color: var(--verde-destaque); transform: scale(1.1); }
        .badge-carrinho { position: absolute; top: -10px; right: -12px; background: #e74c3c; color: white; border-radius: 50%; padding: 3px 7px; font-size: 0.7em; font-weight: bold; border: 2px solid var(--verde-principal);}

        .secao { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .topo-catalogo { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;}
        .btn-voltar { background: var(--branco); color: var(--grafite); text-decoration: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; border: 1px solid var(--borda); transition: 0.3s; display: flex; align-items: center; gap: 10px; text-transform: uppercase;}
        .btn-voltar:hover { background: var(--fundo); border-color: var(--verde-principal); color: var(--verde-principal);}
        .titulo-secao { font-size: 2.2em; color: var(--verde-principal); text-transform: uppercase; font-weight: 900; margin: 0 auto;}

        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .cartao-produto { background: white; border: 1px solid var(--borda); padding: 25px; border-radius: 8px; text-align: center; transition: 0.3s; position: relative; display: flex; flex-direction: column; height: 100%;}
        .cartao-produto:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--verde-principal); transform: translateY(-5px);}
        .selo-desconto { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 6px 12px; font-size: 0.85em; font-weight: 900; border-radius: 3px; letter-spacing: 1px;}
        .cartao-produto img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        .cartao-produto h3 { font-size: 1.1em; margin-bottom: 10px; color: var(--grafite); line-height: 1.4; font-weight: bold;}
        .preco-antigo { text-decoration: line-through; color: #999; font-size: 0.9em; min-height: 1.2em;}
        .preco-atual { color: var(--verde-principal); font-size: 2em; font-weight: 900; margin-bottom: 15px; margin-top: auto;}
        .btn-comprar { margin-top: auto; background: var(--verde-principal); color: white; text-decoration: none; padding: 15px; font-weight: bold; text-transform: uppercase; border-radius: 4px; display: block; width: 100%; border: none; cursor: pointer; transition: 0.3s;}
        .btn-comprar:hover { background: var(--verde-destaque); }

        /* BARRA DE PESQUISA */
        .faixa-pesquisa { background: var(--verde-escuro); padding: 15px 5%; display: flex; justify-content: center; border-bottom: 2px solid #0a3518; margin-bottom: 30px;}
        .box-pesquisa { display: flex; width: 100%; max-width: 700px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 25px;}
        .box-pesquisa input { flex: 1; padding: 14px 20px; border: none; border-radius: 25px 0 0 25px; outline: none; font-size: 1.05em; }
        .box-pesquisa button { background: var(--verde-destaque); color: white; border: none; padding: 0 30px; border-radius: 0 25px 25px 0; cursor: pointer; font-size: 1.2em; transition: 0.3s;}
        .box-pesquisa button:hover { background: #159f4d; }

        /* ESTILO DA LISTA DE PEÇAS (SANFONA) */
        .secao-titulo { text-align: center; color: var(--verde-escuro); margin: 40px 0 20px; font-size: 2em; width: 100%; }
        .lista-pecas { max-width: 800px; margin: 0 auto 50px auto; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .peca-item { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .peca-cabecalho { background: #f8f9fa; padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        .peca-cabecalho:hover { background: #e9ecef; }
        .peca-conteudo { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease-out; background: white; }
        .peca-conteudo.ativo { padding: 20px; max-height: 500px; border-top: 1px solid #eee; }
        .peca-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .seta { transition: transform 0.3s; }
        .peca-cabecalho.aberto .seta { transform: rotate(180deg); }

        /* --- BOTÃO VOLTAR --- */
        .btn-voltar { display: inline-block; margin: 20px; padding: 10px 20px; background: var(--verde-escuro, #333); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-voltar:hover { opacity: 0.8; }

        /* --- SIMETRIA DOS CARTÕES --- */
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .cartao-produto { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            justify-content: space-between; /* Empurra o botão pro fundo */
        }
        .cartao-produto img {
            height: 180px; /* Trava a altura da imagem */
            width: 100%;
            object-fit: contain; /* Não deixa a imagem esticada nem cortada */
            margin-bottom: 15px;
        }
        .cartao-produto h3 {
            flex-grow: 1; /* Faz o título crescer e empurrar os preços pra baixo de forma alinhada */
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 48px; /* Espaço garantido para nomes grandes */
            margin: 0 0 10px 0;
        }

        /* --- ESTILO DOS GRUPOS DE PEÇAS --- */
        .grupo-pecas { max-width: 800px; margin: 0 auto 30px auto; width: 100%; }
        .titulo-grupo { color: var(--verde-escuro, #333); border-bottom: 2px solid #ddd; padding-bottom: 5px; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <img src="images.jfif" alt="Giacomini" class="logo-img" onerror="this.src='padrao.png'">
            <span class="logo-texto">Giacomini</span>
        </a>
        <a href="carrinho.html" class="icone-carrinho-topo" title="Ir para o Carrinho">
            <i class="fas fa-shopping-cart"></i>
            <span id="contador-carrinho" class="badge-carrinho">0</span>
        </a>
    </header>

    <div class="faixa-pesquisa">
        <div class="box-pesquisa">
            <input type="text" id="input-busca" placeholder="Buscar no catálogo..." onkeypress="if(event.key === 'Enter') fazerBusca()">
            <button onclick="fazerBusca()"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <main>
        <a href="index.html" class="btn-voltar">← Voltar para a Loja</a>

        <h2 class="secao-titulo">Máquinas e Ferramentas</h2>
        <div id="lista-maquinas" class="grid-produtos"></div>

        <h2 class="secao-titulo" style="margin-top: 50px;">Catálogo de Peças</h2>
        <div id="container-grupos-pecas" style="padding: 0 20px;"></div>
    </main>

   <script>
        const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSjwdcNetNoRZzXi20wyCVlMwhQf86ckoI8ZcIDui7wnvQpxUg7NIAio6HEu_CMHqyG1yT4Rcee_q6H/pub?output=csv';

        function atualizarContador() {
            let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
            let contador = document.getElementById('contador-carrinho');
            if(contador) contador.innerText = carrinho.length;
        }

        function criarCartao(p) {
            let img = p.img;
            if (img !== '' && !img.startsWith('http') && !img.startsWith('img/')) { img = 'img/' + img; }
            if (img === '') img = 'padrao.png';

            let temDesconto = p.precoAntigo > p.preco;
            let htmlPrecoAntigo = temDesconto ? `<div class="preco-antigo">De: R$ ${p.precoAntigo.toFixed(2).replace('.',',')}</div>` : `<div class="preco-antigo" style="height:20px;"></div>`;
            let seloHTML = temDesconto ? `<div class="selo-desconto">${Math.round(((p.precoAntigo - p.preco) / p.precoAntigo) * 100)}% OFF</div>` : '';
            
            return `
                <a href="produto.html?nome=${encodeURIComponent(p.nome)}" style="text-decoration:none; color:inherit; display:block; height:100%;">
                    <div class="cartao-produto">
                        ${seloHTML}
                        <img src="${img}" onerror="this.src='padrao.png'" alt="${p.nome}">
                        <h3>${p.nome}</h3>
                        <div style="width:100%;">
                            ${htmlPrecoAntigo}
                            <div class="preco-atual">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
                            <button class="btn-comprar" style="width:100%; margin-top:10px;">Ver Detalhes</button>
                        </div>
                    </div>
                </a>`;
        }

        async function carregarCatalogo() {
            try {
                const resposta = await fetch(URL_PLANILHA);
                const dadosTexto = await resposta.text();
                const linhas = dadosTexto.split(/\r?\n/).slice(1).filter(l => l.trim() !== "");

                let produtos = linhas.map(linha => {
                    const col = linha.split(',');
                    if (col.length < 8) return null; // Agora exigimos 8 colunas (A até H)
                    
                    return {
                        nome: col[0] ? col[0].trim() : '',
                        categoria: col[1] ? col[1].trim() : '',
                        subcategoria: col[2] ? col[2].trim() : 'Outros', // COLUNA C: TIPO DE PEÇA
                        preco: parseFloat(col[3]) || 0,                  // COLUNA D: PREÇO
                        precoAntigo: parseFloat(col[4]) || 0,            // COLUNA E: PREÇO ANTIGO
                        img: col[5] ? col[5].trim() : '',                // COLUNA F: IMAGEM
                        estoque: parseInt(col[6]) || 0,                  // COLUNA G: ESTOQUE
                        descricao: col[7] ? col[7].trim() : ''           // COLUNA H: DESCRIÇÃO
                    };
                }).filter(p => p !== null && p.estoque > 0);

                const maquinas = produtos.filter(p => !p.categoria.toLowerCase().includes('peça') && !p.categoria.toLowerCase().includes('peca'));
                const pecas = produtos.filter(p => p.categoria.toLowerCase().includes('peça') || p.categoria.toLowerCase().includes('peca'));

                const containerMaquinas = document.getElementById('lista-maquinas');
                const containerPecas = document.getElementById('container-grupos-pecas');

                // 1. Renderiza as Máquinas
                if (containerMaquinas) {
                    containerMaquinas.innerHTML = maquinas.length > 0 ? maquinas.map(p => criarCartao(p)).join('') : '<p style="width:100%; text-align:center;">Nenhuma máquina encontrada.</p>';
                }

                // 2. Agrupa e Renderiza as Peças
                if (containerPecas) {
                    if (pecas.length > 0) {
                        // Agrupa as peças pela coluna Subcategoria (Anel, Rolamento, etc)
                        let grupos = {};
                        pecas.forEach(p => {
                            if (!grupos[p.subcategoria]) grupos[p.subcategoria] = [];
                            grupos[p.subcategoria].push(p);
                        });

                        let htmlGrupos = '';
                        // Cria a sanfona separada por grupos
                        for (let subcat in grupos) {
                            htmlGrupos += `
                            <div class="grupo-pecas">
                                <h3 class="titulo-grupo">${subcat}</h3>
                                <div class="lista-pecas">
                                    ${grupos[subcat].map((p, index) => {
                                        let idUnico = subcat.replace(/\s+/g, '') + index;
                                        return `
                                        <div class="peca-item">
                                            <div class="peca-cabecalho" onclick="abrirPeca('${idUnico}')" id="cabecalho-${idUnico}">
                                                <span>${p.nome}</span>
                                                <span><strong style="color:var(--verde-destaque); margin-right:15px;">R$ ${p.preco.toFixed(2).replace('.', ',')}</strong> <span class="seta">▼</span></span>
                                            </div>
                                            <div class="peca-conteudo" id="conteudo-${idUnico}">
                                                <div class="peca-info">
                                                    <div>
                                                        <p><strong>Estoque:</strong> ${p.estoque} unidades</p>
                                                        <p><strong>Detalhes:</strong> ${p.descricao}</p>
                                                    </div>
                                                    <a href="produto.html?nome=${encodeURIComponent(p.nome)}" class="btn-comprar" style="text-decoration:none; display:inline-block; margin-top:10px;">Ver Peça</a>
                                                </div>
                                            </div>
                                        </div>`
                                    }).join('')}
                                </div>
                            </div>`;
                        }
                        containerPecas.innerHTML = htmlGrupos;
                    } else {
                        containerPecas.innerHTML = '<p style="text-align:center;">Nenhuma peça encontrada.</p>';
                    }
                }

            } catch (erro) {
                console.error("Erro na planilha", erro);
            }
        }

        function abrirPeca(id) {
            const conteudo = document.getElementById(`conteudo-${id}`);
            const cabecalho = document.getElementById(`cabecalho-${id}`);
            if (conteudo && cabecalho) {
                conteudo.classList.toggle('ativo');
                cabecalho.classList.toggle('aberto');
            }
        }

        window.onload = () => { carregarCatalogo(); atualizarContador(); };
    </script>
</body>
</html>
